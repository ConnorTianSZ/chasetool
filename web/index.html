<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChaseBase</title>
  <link rel="stylesheet" href="/static/style.css?v=0.2" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <script src="/static/app.js?v=0.2"></script>
</head>
<body x-data="root">

<div id="toast-container" class="toast-container"></div>

<!-- ══════════════════════════════════════════════════════
     首页：项目选择
══════════════════════════════════════════════════════ -->
<div x-show="view === 'home'" class="home-screen">
  <div class="home-header">
    <div class="home-logo">Chase<span>Base</span></div>
    <div class="home-subtitle">采购催货管理系统</div>
  </div>

  <div class="home-body">
    <div class="home-section-title">选择项目</div>

    <div class="project-grid">
      <!-- 新建项目卡片 -->
      <div class="project-card project-card-new" @click="showNewProject = true">
        <div class="project-card-icon">＋</div>
        <div class="project-card-name">新建项目</div>
      </div>

      <!-- 已有项目 -->
      <template x-for="p in projects" :key="p.id">
        <div class="project-card" @click="selectProject(p)">
          <div class="project-card-icon" style="font-size:28px;">📁</div>
          <div class="project-card-name" x-text="p.name"></div>
          <div class="project-card-id" x-text="p.id"></div>
          <div class="project-card-desc" x-text="p.description || ''"></div>
        </div>
      </template>

      <template x-if="projects.length === 0">
        <div style="grid-column:1/-1;text-align:center;color:#888;padding:40px 0;">
          暂无项目，点击"新建项目"开始
        </div>
      </template>
    </div>
  </div>

  <!-- 新建项目 Modal -->
  <div class="modal-overlay" x-show="showNewProject" @click.self="showNewProject=false" style="display:none;">
    <div class="modal" x-show="showNewProject">
      <div class="modal-header">
        <h3>新建项目</h3>
        <button class="modal-close" @click="showNewProject=false">×</button>
      </div>
      <div class="modal-body">
        <div style="display:grid;gap:14px;">
          <div>
            <label class="field-label">项目 ID（唯一标识，如 M.6001515）</label>
            <input type="text" x-model="newForm.id" placeholder="M.6001515" style="width:100%;margin-top:4px;" />
          </div>
          <div>
            <label class="field-label">项目名称</label>
            <input type="text" x-model="newForm.name" placeholder="1515 项目" style="width:100%;margin-top:4px;" />
          </div>
          <div>
            <label class="field-label">描述（可选）</label>
            <input type="text" x-model="newForm.description" placeholder="简短描述" style="width:100%;margin-top:4px;" />
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" @click="showNewProject=false">取消</button>
        <button class="btn btn-primary" @click="createProject()" :disabled="loading">
          <span x-text="loading ? '创建中…' : '创建项目'"></span>
        </button>
      </div>
    </div>
  </div>
</div>


<!-- ══════════════════════════════════════════════════════
     子应用：已选定项目
══════════════════════════════════════════════════════ -->
<div x-show="view === 'app'" class="app" x-cloak>

  <!-- ── 侧边栏 ── -->
  <aside class="sidebar">
    <div class="sidebar-logo">Chase<span>Base</span></div>
    <div class="sidebar-project" x-text="activeProject?.name || ''" title="点击返回" @click="backHome()" style="cursor:pointer;"></div>

    <nav style="flex:1;display:flex;flex-direction:column;padding:6px 0;">
      <a class="nav-item" :class="{active: $store.nav.page==='materials'}" @click="$store.nav.setPage('materials')">
        <span class="icon">📋</span><span>物料表</span>
      </a>
      <a class="nav-item" :class="{active: $store.nav.page==='inbox'}" @click="$store.nav.setPage('inbox')">
        <span class="icon">📬</span><span>收件审批</span>
      </a>
      <a class="nav-item" :class="{active: $store.nav.page==='dashboard'}" @click="$store.nav.setPage('dashboard')">
        <span class="icon">📊</span><span>Dashboard</span>
      </a>
      <a class="nav-item" :class="{active: $store.nav.page==='chat'}" @click="$store.nav.setPage('chat')">
        <span class="icon">💬</span><span>Chat</span>
      </a>
      <a class="nav-item" :class="{active: $store.nav.page==='imports'}" @click="$store.nav.setPage('imports')">
        <span class="icon">📥</span><span>导入导出 Excel</span>
      </a>
      <a class="nav-item" :class="{active: $store.nav.page==='settings'}" @click="$store.nav.setPage('settings')">
        <span class="icon">⚙️</span><span>设置</span>
      </a>
      <div style="flex:1;"></div>
      <a class="nav-item" @click="backHome()" style="margin-bottom:8px;">
        <span class="icon">🏠</span><span>切换项目</span>
      </a>
    </nav>
  </aside>

  <!-- ── 主内容 ── -->
  <div class="main">

    <!-- ════════ 物料表 ════════ -->
    <template x-if="$store.nav.page === 'materials' && activeProject">
      <div x-data="materials(activeProject.id)" style="display:flex;flex-direction:column;flex:1;min-height:0;">

        <div class="topbar">
          <span class="topbar-title">物料总览</span>
          <span class="badge badge-open" x-text="total + ' 条'"></span>
          <span x-show="filterOptions.stations.length" style="font-size:12px;color:#888;margin-left:8px;"
                x-text="filterOptions.stations.length + ' 个站号'"></span>
          <label class="key-date-control">
            <span>KEY DATE</span>
            <input type="date" x-model="keyDate" @change="saveKeyDate()" />
          </label>
        </div>

        <!-- 筛选栏 -->
        <div class="filter-bar">
          <input type="text" placeholder="搜索 PO/料号/描述…" x-model="filters.search" @keydown.enter="applyFilter()" style="width:200px;" />
          <input type="text" placeholder="PO号" x-model="filters.po_number" style="width:120px;" />
          <details class="multi-filter" x-data="{ q: '' }" @toggle="q=''">
            <summary x-text="stationFilterLabel"></summary>
            <div class="multi-filter-menu">
              <input type="text" x-model="q" placeholder="搜索站号…" class="multi-filter-search" @click.stop @keydown.stop />
              <template x-for="s in filterOptions.stations.filter(s => !q || String(s).toLowerCase().includes(q.toLowerCase()))" :key="s">
                <label>
                  <input type="checkbox" :value="s" x-model="filters.station_no" />
                  <span x-text="s + ' 站'"></span>
                </label>
              </template>
              <template x-if="filterOptions.stations.filter(s => !q || String(s).toLowerCase().includes(q.toLowerCase())).length === 0">
                <div class="multi-empty">无匹配</div>
              </template>
            </div>
          </details>
          <details class="multi-filter" x-data="{ q: '' }" @toggle="q=''">
            <summary x-text="pgrFilterLabel"></summary>
            <div class="multi-filter-menu">
              <input type="text" x-model="q" placeholder="搜索 PGR…" class="multi-filter-search" @click.stop @keydown.stop />
              <template x-for="pg in filterOptions.purchasing_groups.filter(pg => !q || String(pg).toLowerCase().includes(q.toLowerCase()))" :key="pg">
                <label>
                  <input type="checkbox" :value="pg" x-model="filters.purchasing_group" />
                  <span x-text="pg"></span>
                </label>
              </template>
              <template x-if="filterOptions.purchasing_groups.filter(pg => !q || String(pg).toLowerCase().includes(q.toLowerCase())).length === 0">
                <div class="multi-empty">无匹配</div>
              </template>
            </div>
          </details>
          <details class="multi-filter" x-data="{ q: '' }" @toggle="q=''">
            <summary x-text="buyerFilterLabel"></summary>
            <div class="multi-filter-menu">
              <input type="text" x-model="q" placeholder="搜索采购员…" class="multi-filter-search" @click.stop @keydown.stop />
              <template x-for="b in filterOptions.buyers.filter(b => !q || (b.name||'').toLowerCase().includes(q.toLowerCase()) || (b.email||'').toLowerCase().includes(q.toLowerCase()))" :key="b.key">
                <label>
                  <input type="checkbox" :value="b.key" x-model="filters.buyer_key" />
                  <span x-text="b.name || b.email || '未知'"></span>
                </label>
              </template>
              <template x-if="filterOptions.buyers.filter(b => !q || (b.name||'').toLowerCase().includes(q.toLowerCase()) || (b.email||'').toLowerCase().includes(q.toLowerCase())).length === 0">
                <div class="multi-empty">暂无采购员</div>
              </template>
            </div>
          </details>
          <details class="multi-filter">
            <summary x-text="stateFilterLabel"></summary>
            <div class="multi-filter-menu">
              <label><input type="checkbox" value="overdue_now" x-model="filters.material_state" /><span>应交未交</span></label>
              <label><input type="checkbox" value="overdue_keydate" x-model="filters.material_state" /><span>晚于节点</span></label>
              <label><input type="checkbox" value="normal" x-model="filters.material_state" /><span>正常</span></label>
              <label><input type="checkbox" value="no_oc" x-model="filters.material_state" /><span>无OC</span></label>
              <label><input type="checkbox" value="delivered" x-model="filters.material_state" /><span>已交货</span></label>
            </div>
          </details>
          <label class="check-label"><input type="checkbox" x-model="filters.overdue" /> 仅逾期</label>
          <label class="check-label"><input type="checkbox" x-model="filters.no_eta" /> 无交期</label>
          <label class="check-label"><input type="checkbox" :checked="filters.is_focus==='true'" @change="filters.is_focus=($event.target.checked?'true':'')" /> 重点</label>
          <button class="btn btn-primary btn-sm" @click="applyFilter()">筛选</button>
          <button class="btn btn-outline btn-sm" @click="resetFilter()">重置</button>
        </div>

        <!-- 工具栏 -->
        <div class="toolbar">
          <template x-if="selected.size > 0">
            <span class="selected-hint">已选 <strong x-text="selected.size"></strong> 条</span>
          </template>
          <button class="btn btn-primary btn-sm" @click="openChaseModal()" :disabled="selected.size===0">✉️ 一键催货</button>
          <button class="btn btn-outline btn-sm" @click="load()">🔄 刷新</button>
          <button class="btn btn-outline btn-sm" @click="exportDb()" title="导出当前项目完整数据库为 Excel">📤 导出完整数据</button>
          <div class="toolbar-options">
            <span>催货显示</span>
            <label class="check-label"><input type="checkbox" x-model="chaseView.count" /> 次数</label>
            <label class="check-label"><input type="checkbox" x-model="chaseView.chaseDate" /> 催货日</label>
            <label class="check-label"><input type="checkbox" x-model="chaseView.feedbackDate" /> 反馈日</label>
          </div>
        </div>

        <!-- 表格 -->
        <div class="table-wrap" style="flex:1;overflow:auto;">
          <div x-show="loading" class="loading-hint">加载中…</div>
          <table x-show="!loading">
            <thead>
              <tr>
                <th><input type="checkbox" @change="toggleAll()" /></th>
                <th>PO号</th>
                <th>Item</th>
                <th>WBS</th>
                <th>PGR</th>
                <th>供应商</th>
                <th>料号</th>
                <th>描述</th>
                <th>制造商</th>
                <th>订单数量</th>
                <th>未交数量</th>
                <th>下单日期</th>
                <th>确认交期</th>
                <th style="color:#d97706;">催后更新交期</th>
                <th>状态</th>
                <th>催货状态</th>
                <th>采购员</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody>
              <template x-for="item in items" :key="item.id">
                <tr :class="{'is-focus': item.is_focus, 'is-overdue': isOverdue(item), 'is-overdue-now': isOverdueNow(item), 'is-overdue-keydate': isOverdueKeydate(item), 'is-no-eta': noEta(item), 'is-eta-mismatch': isEtaMismatch(item)}">
                  <td><input type="checkbox" :checked="selected.has(item.id)" @change="toggleSelect(item.id)" /></td>
                  <td x-text="item.po_number"></td>
                  <td x-text="item.item_no"></td>
                  <td x-text="item.wbs_element || '—'"></td>
                  <td><span x-text="item.purchasing_group || '—'"></span></td>
                  <td x-text="item.supplier || '—'"></td>
                  <td x-text="item.part_no || '—'"></td>
                  <td class="td-desc" :title="item.description" x-text="item.description || '—'"></td>
                  <td x-text="item.manufacturer || '—'" style="font-size:12px;"></td>
                  <td x-text="item.quantity ? (item.quantity + ' ' + (item.unit||'')) : '—'"></td>
                  <td x-text="item.open_quantity_gr ?? '—'"></td>
                  <td x-text="item.display_order_date || formatDate(item.order_date) || '—'"></td>
                  <td>
                    <template x-if="noEta(item)">
                      <span class="badge badge-no-eta">无OC</span>
                    </template>
                    <template x-if="!noEta(item)">
                      <span x-text="item.display_current_eta || formatDate(item.current_eta)" :style="isOverdue(item) ? 'color:#dc2626;font-weight:600' : ''"></span>
                    </template>
                  </td>
                  <td>
                    <template x-if="item.display_urgent_feedback_eta">
                      <span style="color:#d97706;font-weight:600;" x-text="item.display_urgent_feedback_eta"></span>
                    </template>
                    <template x-if="!item.display_urgent_feedback_eta">
                      <span style="color:#d1d5db;">—</span>
                    </template>
                  </td>
                  <td>
                    <span class="badge" :class="statusBadge(item)" x-text="item.material_state_label || item.status"></span>
                  </td>
                  <td><span class="badge" :class="item.chase_badge || 'badge-cancelled'" x-text="chaseDisplay(item)"></span></td>
                  <td :title="item.buyer_email || ''" x-text="item.buyer_name || item.buyer_email || '—'"></td>
                  <td style="white-space:nowrap;">
                    <button class="btn btn-outline btn-sm" @click="openDetail(item)">详情</button>
                    <button class="btn btn-sm" :class="item.is_focus ? 'btn-warning' : 'btn-outline'" @click="toggleFocus(item)" :title="item.is_focus?'取消重点':'标记重点'">
                      <span x-text="item.is_focus ? '⭐' : '☆'"></span>
                    </button>
                  </td>
                </tr>
              </template>
              <template x-if="items.length === 0 && !loading">
                <tr><td colspan="18" class="empty"><div class="icon">📋</div>暂无数据，请先导入 Excel</td></tr>
              </template>
            </tbody>
          </table>
        </div>

        <!-- 分页 -->
        <div class="pagination">
          <span style="font-size:12px;color:#888;margin-right:8px;">共 <b x-text="total"></b> 条</span>
          <button @click="prevPage()" :disabled="page<=1">‹</button>
          <button class="active" x-text="page"></button>
          <span style="font-size:12px;padding:0 4px;">/</span>
          <button x-text="totalPages" @click="page=totalPages;load()"></button>
          <button @click="nextPage()" :disabled="page>=totalPages">›</button>
        </div>

        <!-- ── 详情 Modal ── -->
        <div class="modal-overlay" x-show="showDetail" @click.self="showDetail=false" style="display:none;">
          <div class="modal" x-show="showDetail">
            <div class="modal-header">
              <h3>物料详情</h3>
              <button class="modal-close" @click="showDetail=false">×</button>
            </div>
            <div class="modal-body" x-show="detailItem">
              <template x-if="detailItem">
                <div>
                  <table class="detail-table">
                    <tr><td>PO号</td><td x-text="detailItem.po_number"></td><td>Item</td><td x-text="detailItem.item_no"></td></tr>
                    <tr><td>WBS</td><td x-text="detailItem.wbs_element||'—'"></td><td>站号</td><td x-text="detailItem.station_no||'—'"></td></tr>
                    <tr><td>采购组</td><td x-text="detailItem.purchasing_group||'—'"></td><td>供应商</td><td x-text="detailItem.supplier||'—'"></td></tr>
                    <tr><td>供应商编号</td><td x-text="detailItem.supplier_code||'—'"></td><td>Plant</td><td x-text="detailItem.plant||'—'"></td></tr>
                    <tr><td>料号</td><td x-text="detailItem.part_no||'—'"></td><td>制造商</td><td x-text="detailItem.manufacturer||'—'"></td></tr>
                    <tr><td>制造商料号</td><td x-text="detailItem.manufacturer_part_no||'—'"></td><td>订单数量</td><td x-text="(detailItem.quantity||'—')+' '+(detailItem.unit||'')"></td></tr>
                    <tr><td>未交数量</td><td x-text="detailItem.open_quantity_gr??'—'"></td><td>净价</td><td x-text="detailItem.net_order_price ? (detailItem.net_order_price+' '+detailItem.currency) : '—'"></td></tr>
                    <tr><td>订单金额</td><td x-text="detailItem.net_order_value ? (detailItem.net_order_value+' '+detailItem.currency) : '—'"></td><td>下单日期</td><td x-text="detailItem.display_order_date || formatDate(detailItem.order_date) || '—'"></td></tr>
                    <tr><td>静态交期</td><td x-text="formatDate(detailItem.statical_delivery_date)||'—'"></td><td>采购员</td><td x-text="detailItem.buyer_name || detailItem.buyer_email || '—'"></td></tr>
                  </table>

                  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:14px 0;">
                    <div>
                      <label class="field-label">确认交期（Confirmed Del. Date）</label>
                      <div style="width:100%;margin-top:4px;padding:7px 9px;border:1px solid #e5e7eb;border-radius:6px;background:#f9fafb;color:#374151;"
                        x-text="detailItem.display_current_eta || formatDate(detailItem.current_eta) || '—'"></div>
                      <div style="font-size:11px;color:#6b7280;margin-top:4px;">来自 SAP Excel 导入，不在此处手工修改</div>
                    </div>
                    <div>
                      <label class="field-label">供应商反馈交期（邮件/手工维护）</label>
                      <input type="date" x-model="detailItem.supplier_eta" style="width:100%;margin-top:4px;" />
                    </div>
                    <div>
                      <label class="field-label">状态</label>
                      <select x-model="detailItem.status" style="width:100%;margin-top:4px;">
                        <option value="open">进行中</option>
                        <option value="delivered">已交货</option>
                        <option value="cancelled">已取消</option>
                        <option value="on_hold">暂停</option>
                      </select>
                    </div>
                    <div>
                      <label class="field-label">供应商备注</label>
                      <input type="text" x-model="detailItem.supplier_remarks" style="width:100%;margin-top:4px;" placeholder="无" />
                    </div>
                  </div>

                  <!-- 历史兼容字段：新逻辑统一维护 supplier_eta -->
                  <div x-show="detailItem.display_urgent_feedback_eta || detailItem.urgent_feedback_note"
                    style="background:#fffbeb;border:1px solid #fcd34d;border-radius:6px;padding:10px 14px;margin:10px 0;">
                    <div style="font-size:12px;font-weight:700;color:#b45309;margin-bottom:8px;">历史催后交期（旧字段，只读）</div>
                    <div style="font-size:11px;color:#92400e;margin-top:6px;">
                      当前：<span x-text="detailItem.display_urgent_feedback_eta || '未设置'" style="font-weight:600;"></span>
                      <template x-if="detailItem.urgent_feedback_note">
                        <span x-text="' — ' + detailItem.urgent_feedback_note"></span>
                      </template>
                    </div>
                  </div>

                  <div style="font-size:12px;font-weight:600;color:#888;margin-bottom:6px;">字段更新历史</div>
                  <div style="max-height:150px;overflow-y:auto;border:1px solid #e5e7eb;border-radius:4px;">
                    <table style="font-size:11px;width:100%;">
                      <thead><tr style="background:#f9fafb;"><th style="padding:3px 8px;">字段</th><th>旧值</th><th>新值</th><th>来源</th><th>时间</th></tr></thead>
                      <tbody>
                        <template x-for="h in detailHistory" :key="h.id">
                          <tr style="border-bottom:1px solid #f3f4f6;">
                            <td style="padding:3px 8px;" x-text="h.field_name"></td>
                            <td x-text="h.old_value||'—'"></td><td x-text="h.new_value||'—'"></td>
                            <td x-text="h.source"></td><td x-text="(h.timestamp||'').slice(0,16)"></td>
                          </tr>
                        </template>
                      </tbody>
                    </table>
                  </div>
                </div>
              </template>
            </div>
            <div class="modal-footer">
              <button class="btn btn-outline" @click="showDetail=false">取消</button>
              <button class="btn btn-primary" @click="saveDetail()">保存</button>
            </div>
          </div>
        </div>

        <!-- ── 催货预览 Modal ── -->
        <div class="modal-overlay" x-show="showChaseModal" @click.self="showChaseModal=false" style="display:none;">
          <div class="modal" style="width:720px;" x-show="showChaseModal">
            <div class="modal-header">
              <h3>催货邮件预览</h3>
              <button class="modal-close" @click="showChaseModal=false">×</button>
            </div>
            <div class="modal-body">
              <div x-show="chaseLoading" class="loading-hint">正在生成草稿…</div>
              <template x-if="!chaseLoading">
                <div>
                  <!-- 发送方式 -->
                  <div class="form-row" style="margin-bottom:12px;">
                    <span style="font-size:13px;white-space:nowrap;">发送方式：</span>
                    <label class="check-label"><input type="radio" x-model="chaseMode" value="draft" /> 保存草稿到 Outlook（推荐）</label>
                    <label class="check-label"><input type="radio" x-model="chaseMode" value="send" /> 直接发送</label>
                  </div>
                  <!-- 跳过提示 -->
                  <template x-if="chaseSkipped.length > 0">
                    <div style="background:#fffbeb;border:1px solid #fcd34d;border-radius:6px;padding:8px 12px;margin-bottom:10px;font-size:12px;color:#92400e;">
                      <strong>已跳过 <span x-text="chaseSkipped.length"></span> 条无需催促的物料：</strong>
                      <span x-text="chaseSkipped.map(s => s.po_number + '/' + s.item_no + '（' + s.state_label + '）').join('，')"></span>
                    </div>
                  </template>
                  <!-- 草稿列表 -->
                  <template x-for="(draft, i) in chaseDrafts" :key="i">
                    <div style="border:1px solid #e5e7eb;border-radius:6px;margin-bottom:10px;overflow:hidden;">
                      <div style="padding:7px 12px;background:#f9fafb;font-size:12px;color:#555;display:flex;flex-wrap:wrap;gap:6px;align-items:center;">
                        <span>收件人：<strong x-text="draft.to_address || '（未配置邮箱）'"></strong></span>
                        <span style="color:#d1d5db;">|</span>
                        <span>主题：<strong x-text="draft.subject"></strong></span>
                        <span style="color:#d1d5db;">|</span>
                        <span style="color:#6b7280;">涉及 PO：<span x-text="(draft.po_numbers||[]).join(', ')"></span></span>
                      </div>
                      <textarea x-model="draft.body" style="width:100%;height:130px;border:none;padding:10px;font-size:12px;resize:vertical;outline:none;"></textarea>
                    </div>
                  </template>
                  <template x-if="chaseDrafts.length===0 && chaseSkipped.length===0">
                    <div class="empty">暂无草稿</div>
                  </template>
                  <template x-if="chaseDrafts.length===0 && chaseSkipped.length>0">
                    <div class="empty">所选物料均无需催促（已交货或交期在期内）</div>
                  </template>
                </div>
              </template>
            </div>
            <div class="modal-footer">
              <button class="btn btn-outline" @click="showChaseModal=false">取消</button>
              <button class="btn btn-primary" @click="sendChase()" :disabled="chaseLoading||chaseDrafts.length===0">
                <span x-text="chaseMode==='draft' ? '保存草稿' : '立即发送'"></span>
              </button>
            </div>
          </div>
        </div>

      </div><!-- /materials -->
    </template>


    <!-- ════════ 收件审批 ════════ -->
    <template x-if="$store.nav.page === 'inbox' && activeProject">
      <div x-data="inbox(activeProject.id)" style="display:flex;flex-direction:column;flex:1;min-height:0;">

        <div class="topbar">
          <span class="topbar-title">收件审批</span>
          <select x-model="statusFilter" @change="page=1;load()" style="width:110px;">
            <option value="">全部</option>
            <option value="new">未解析</option>
            <option value="pending_confirm">待确认</option>
            <option value="partial">部分入库</option>
            <option value="applied">已入库</option>
            <option value="ignored">已忽略</option>
            <option value="manual">手动处理</option>
            <option value="rejected">不接受</option>
          </select>
        </div>

        <!-- 操作栏 -->
        <div class="toolbar" style="flex-wrap:wrap;gap:10px;padding:12px 16px;border-bottom:1px solid #e5e7eb;">

          <!-- 拉取收件箱 -->
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
            <button class="btn btn-primary btn-sm" @click="pull()" :disabled="pulling">
              <span x-text="pulling ? '拉取中…' : '🔄 查找回邮'"></span>
            </button>
            <button class="btn btn-outline btn-sm" @click="parseAll()" :disabled="parsingAll || total===0"
              x-show="!parsingAll" title="对所有未解析邮件调用 LLM 一次性解析">
              🤖 一键解析所有
            </button>
            <button class="btn btn-outline btn-sm" disabled x-show="parsingAll">
              解析中…
            </button>
            <label class="check-label">
              <input type="checkbox" x-model="deepSearch" /> 深度查找（90天）
            </label>
            <template x-if="!deepSearch">
              <div style="display:flex;align-items:center;gap:6px;">
                <span style="font-size:12px;color:#888;">自定义天数：</span>
                <input type="number" x-model="pullDays" placeholder="留空=自动" style="width:80px;font-size:12px;" min="1" max="365" />
              </div>
            </template>
            <span class="pull-hint" x-text="pullHint"></span>
          </div>

          <!-- 拉取统计 banner -->
          <template x-if="pullStats">
            <div style="width:100%;background:#f0fdf4;border:1px solid #86efac;border-radius:6px;padding:6px 12px;font-size:12px;color:#15803d;display:flex;gap:16px;align-items:center;">
              <span>✅ 查找完成</span>
              <span>找到回邮：<strong x-text="pullStats.pulled"></strong> 封</span>
              <span style="color:#6b7280;">跳过无标记：<span x-text="pullStats.skipped_no_marker"></span> 封</span>
              <span style="color:#6b7280;">已存在：<span x-text="pullStats.skipped_duplicate"></span> 封</span>
              <span style="color:#6b7280;">查找范围：<span x-text="pullStats.pulled_days"></span> 天</span>
            </div>
          </template>

          <!-- 上传 .msg 文件 -->
          <div style="display:flex;align-items:center;gap:8px;">
            <span style="font-size:12px;color:#888;">补传 .msg：</span>
            <label class="btn btn-outline btn-sm" style="cursor:pointer;">
              <span x-text="msgUploading ? '上传中…' : '📎 选择 .msg 文件'"></span>
              <input type="file" accept=".msg" style="display:none;" @change="uploadMsg($event)" :disabled="msgUploading" />
            </label>
          </div>

        </div>

        <!-- 邮件列表 -->
        <div class="content" style="flex:1;overflow-y:auto;">
          <div x-show="loading" class="loading-hint">加载中…</div>

          <template x-for="item in items" :key="item.id">
            <div class="inbox-card">
              <div class="inbox-card-header">
                <span style="font-weight:600;" x-text="item.from_address"></span>
                <span style="color:#888;margin-left:8px;font-size:12px;" x-text="(item.received_at||'').slice(0,16)"></span>
                <span style="flex:1;margin:0 10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:13px;" x-text="item.subject"></span>
                <template x-if="item.parsed_marker">
                  <span class="badge badge-open" x-text="item.parsed_marker" style="margin-right:6px;font-size:10px;"></span>
                </template>
                <span class="badge"
                  :class="{
                    'badge-open':      item.status==='new',
                    'badge-on_hold':   item.status==='pending_confirm',
                    'badge-eta-mismatch': item.status==='partial',
                    'badge-delivered': item.status==='applied',
                    'badge-overdue-keydate': item.status==='rejected',
                    'badge-cancelled': item.status==='ignored'||item.status==='manual'||item.status==='escalate'
                  }"
                  x-text="{new:'未解析',pending_confirm:'待确认',partial:'部分入库',applied:'已入库',ignored:'已忽略',manual:'手动处理',rejected:'已回复不接受'}[item.status]||item.status"></span>
              </div>

              <div class="inbox-card-body">
                <div class="inbox-email-panel" x-text="item.body"></div>
                <div class="inbox-parsed-panel">
                  <!-- ── 解析结果：逐行审批表 ── -->
                  <template x-if="item.llm_extracted_json">
                    <div>
                      <!-- 汇总行：general_remarks -->
                      <template x-if="item.llm_extracted_json.general_remarks">
                        <div style="margin-bottom:6px;font-size:12px;">
                          <span style="color:#374151;">📋 <strong x-text="item.llm_extracted_json.general_remarks"></strong></span>
                        </div>
                      </template>
                      <!-- 逐行物料审批表 -->
                      <div style="overflow-x:auto;">
                        <table class="eta-review-table">
                          <thead>
                            <tr>
                              <th style="width:28px;text-align:center;">☑</th>
                              <th>PO号</th>
                              <th>行号</th>
                              <th>提取交期</th>
                              <th style="min-width:140px;">提取备注</th>
                              <th>物料号</th>
                              <th>供应商</th>
                              <th>当前交期</th>
                              <th>状态</th>
                            </tr>
                          </thead>
                          <tbody>
                            <template x-for="(ei, idx) in (item.llm_extracted_json.items||[])" :key="idx">
                              <tr :class="ei._applied ? 'row-applied' : (item._itemSelections?.[idx]?.selected===false ? 'row-deselected' : '')">
                                <td style="text-align:center;">
                                  <template x-if="ei._applied">
                                    <span title="已入库" style="color:#16a34a;font-weight:600;">✓</span>
                                  </template>
                                  <template x-if="!ei._applied">
                                    <input type="checkbox"
                                      :checked="item._itemSelections?.[idx]?.selected !== false"
                                      @change="if(item._itemSelections?.[idx]) item._itemSelections[idx].selected = $event.target.checked" />
                                  </template>
                                </td>
                                <td x-text="ei.po_number||'—'"></td>
                                <td x-text="ei.item_no||'—'"></td>
                                <td>
                                  <template x-if="ei._applied">
                                    <span x-text="ei.new_eta||'—'" style="color:#6b7280;font-size:12px;"></span>
                                  </template>
                                  <template x-if="!ei._applied">
                                    <input type="date" class="inline-input"
                                      :value="item._itemSelections?.[idx]?.new_eta"
                                      @input="if(item._itemSelections?.[idx]) item._itemSelections[idx].new_eta = $event.target.value"
                                      style="width:110px;" />
                                  </template>
                                </td>
                                <td>
                                  <template x-if="ei._applied">
                                    <span x-text="ei.remarks||'—'" style="color:#6b7280;font-size:12px;"></span>
                                  </template>
                                  <template x-if="!ei._applied">
                                    <input type="text" class="inline-input"
                                      :value="item._itemSelections?.[idx]?.remarks"
                                      @input="if(item._itemSelections?.[idx]) item._itemSelections[idx].remarks = $event.target.value"
                                      style="width:100%;min-width:120px;" />
                                  </template>
                                </td>
                                <td x-text="ei.matched?.part_no||'—'"></td>
                                <td x-text="ei.matched?.supplier||'—'"></td>
                                <td x-text="ei.matched?.current_eta||'—'"></td>
                                <td>
                                  <template x-if="ei._applied">
                                    <span class="badge badge-sm badge-delivered">已入库</span>
                                  </template>
                                  <template x-if="!ei._applied && ei.matched">
                                    <span class="badge badge-sm"
                                      :class="{
                                        'badge-no-eta':           ei.matched.state_code==='no_oc',
                                        'badge-overdue-now':      ei.matched.state_code==='overdue_now',
                                        'badge-overdue-keydate':  ei.matched.state_code==='overdue_keydate',
                                        'badge-overdue':          ei.matched.state_code==='overdue',
                                        'badge-open':             ei.matched.state_code==='normal',
                                        'badge-delivered':        ei.matched.state_code==='delivered'
                                      }"
                                      x-text="ei.matched.state_label"></span>
                                  </template>
                                  <template x-if="!ei._applied && !ei.matched">
                                    <span class="badge badge-sm badge-cancelled">未匹配</span>
                                  </template>
                                </td>
                              </tr>
                            </template>
                          </tbody>
                        </table>
                      </div>
                    </div>
                  </template>
                  <template x-if="!item.llm_extracted_json">
                    <div style="color:#9ca3af;font-size:12px;padding:10px 0;">点击「🤖 解析」提取交期信息</div>
                  </template>
                </div>
              </div>

              <div class="inbox-card-footer">
                <button class="btn btn-outline btn-sm" @click="parse(item)"
                  x-show="item.status==='new' || item.status==='pending_confirm'">🤖 解析</button>
                <button class="btn btn-success btn-sm" @click="decide(item,'apply')"
                  x-show="item.status==='pending_confirm' || item.status==='partial'">✅ 入库选中行</button>
                <button class="btn btn-outline btn-sm" @click="decide(item,'ignore')"
                  x-show="item.status==='pending_confirm'">🚫 忽略</button>
                <button class="btn btn-danger btn-sm" @click="decide(item,'manual')"
                  x-show="item.status==='pending_confirm'">📋 转手动</button>
                <button class="btn btn-sm" style="background:#fef3c7;color:#b45309;border:1px solid #fcd34d;" @click="openReject(item)"
                  x-show="item.status==='pending_confirm' || item.status==='partial'">❌ 不接受</button>
                <button class="btn btn-sm" style="background:#d1fae5;color:#065f46;border:1px solid #6ee7b7;" @click="finalizeEmail(item)"
                  x-show="item.status==='partial'">🏁 完成此邮件</button>
              </div>
            </div>
          </template>

          <template x-if="items.length===0 && !loading">
            <div class="empty"><div class="icon">📬</div>暂无邮件，点击「查找回邮」拉取</div>
          </template>
        </div>

        <!-- ── 不接受：加急回复 Modal ── -->
        <div class="modal-overlay" x-show="rejectTarget" @click.self="rejectTarget=null" style="display:none;">
          <div class="modal" style="width:680px;" x-show="rejectTarget">
            <div class="modal-header">
              <h3>❌ 回复：交期不接受</h3>
              <button class="modal-close" @click="rejectTarget=null">×</button>
            </div>
            <div class="modal-body">
              <template x-if="rejectTarget">
                <div>
                  <!-- 原邮件信息 -->
                  <div style="font-size:12px;color:#6b7280;margin-bottom:10px;">
                    回复至：<strong x-text="rejectTarget.from_address"></strong>
                    &nbsp;·&nbsp;<span x-text="(rejectTarget.subject||'').slice(0,60)"></span>
                  </div>

                  <!-- 选中物料行 -->
                  <div style="font-size:12px;font-weight:600;color:#374151;margin-bottom:6px;">针对以下物料（可取消勾选）</div>
                  <div style="overflow-x:auto;margin-bottom:14px;">
                    <table class="eta-review-table">
                      <thead>
                        <tr>
                          <th style="width:28px;text-align:center;">☑</th>
                          <th>PO号</th><th>行号</th><th>供应商回复交期</th><th>物料号</th>
                        </tr>
                      </thead>
                      <tbody>
                        <template x-for="(ri, idx) in rejectItems" :key="idx">
                          <tr :class="ri.selected===false ? 'row-deselected' : ''">
                            <td style="text-align:center;">
                              <input type="checkbox" :checked="ri.selected !== false"
                                @change="ri.selected = $event.target.checked" />
                            </td>
                            <td x-text="ri.po_number||'—'"></td>
                            <td x-text="ri.item_no||'—'"></td>
                            <td x-text="ri.new_eta||'—'"></td>
                            <td x-text="ri.part_no||'—'"></td>
                          </tr>
                        </template>
                      </tbody>
                    </table>
                  </div>

                  <!-- 目标交期 -->
                  <div style="display:grid;grid-template-columns:auto 1fr;gap:10px 14px;align-items:center;margin-bottom:14px;">
                    <label class="check-label" style="grid-column:1/-1;font-size:12px;font-weight:600;color:#374151;">目标交期</label>
                    <label class="check-label">
                      <input type="radio" x-model="rejectEtaMode" value="single" /> 指定日期
                    </label>
                    <input type="text" x-show="rejectEtaMode==='single'"
                      x-model="rejectEtaSingle" placeholder="MM/DD，如 06/15"
                      style="width:140px;padding:4px 8px;border:1px solid #d1d5db;border-radius:4px;font-size:13px;" />
                    <label class="check-label">
                      <input type="radio" x-model="rejectEtaMode" value="range" /> 时间段
                    </label>
                    <div x-show="rejectEtaMode==='range'" style="display:flex;align-items:center;gap:6px;">
                      <input type="text" x-model="rejectEtaStart" placeholder="MM/DD"
                        style="width:90px;padding:4px 8px;border:1px solid #d1d5db;border-radius:4px;font-size:13px;" />
                      <span style="color:#9ca3af;">～</span>
                      <input type="text" x-model="rejectEtaEnd" placeholder="MM/DD"
                        style="width:90px;padding:4px 8px;border:1px solid #d1d5db;border-radius:4px;font-size:13px;" />
                    </div>
                  </div>

                  <!-- 发送方式 -->
                  <div style="display:flex;align-items:center;gap:16px;margin-bottom:14px;font-size:13px;">
                    <span style="font-weight:600;color:#374151;">发送方式：</span>
                    <label class="check-label"><input type="radio" x-model="rejectMode" value="draft" /> 保存草稿到 Outlook（推荐）</label>
                    <label class="check-label"><input type="radio" x-model="rejectMode" value="send" /> 直接发送</label>
                  </div>

                  <!-- 邮件正文预览 -->
                  <div style="font-size:12px;font-weight:600;color:#374151;margin-bottom:4px;">邮件正文预览</div>
                  <textarea readonly
                    :value="buildRejectPreview()"
                    style="width:100%;height:160px;border:1px solid #e5e7eb;border-radius:4px;padding:8px;font-size:12px;font-family:monospace;resize:vertical;background:#f9fafb;color:#374151;outline:none;">
                  </textarea>

                  <!-- .msg 上传限制提示 -->
                  <template x-if="rejectTarget && (rejectTarget.outlook_entry_id||'').startsWith('msg:')">
                    <div style="background:#fef3c7;border:1px solid #fcd34d;border-radius:4px;padding:8px 12px;font-size:12px;color:#92400e;margin-top:8px;">
                      ⚠️ 此邮件为手动上传的 .msg 文件，无法通过系统直接回复，请在 Outlook 中手动回复。
                    </div>
                  </template>
                </div>
              </template>
            </div>
            <div class="modal-footer">
              <button class="btn btn-outline" @click="rejectTarget=null">取消</button>
              <button class="btn btn-primary" @click="submitReject()"
                :disabled="rejectLoading || !(rejectEtaMode==='single' ? rejectEtaSingle : rejectEtaStart&&rejectEtaEnd)"
                x-show="!(rejectTarget && (rejectTarget.outlook_entry_id||'').startsWith('msg:'))">
                <span x-text="rejectMode==='draft' ? '保存草稿' : '发送加急回复'"></span>
              </button>
            </div>
          </div>
        </div>

      </div><!-- /inbox -->
    </template>


    <!-- ════════ Dashboard ════════ -->
    <template x-if="$store.nav.page === 'dashboard' && activeProject">
      <div x-data="dashboard(activeProject.id, activeProject.name)" style="display:flex;flex-direction:column;flex:1;min-height:0;">
        <div class="topbar">
          <span class="topbar-title">Dashboard</span>
          <button class="btn btn-outline btn-sm" @click="init()">🔄 刷新</button>
        </div>
        <div class="content">

          <!-- ── 顶部工具栏 ── -->
          <div class="dashboard-actions">
            <label class="key-date-control">
              <span>KEY DATE</span>
              <input type="date" x-model="leadKeyDate" @change="loadLeadBuyer();loadPivotA();loadPivotB();" />
            </label>
            <div style="display:flex;align-items:center;gap:6px;">
              <span style="font-size:12px;color:#6b7280;font-weight:500;">交期基准</span>
              <div class="segmented">
                <button :class="{active:etaSource==='current_eta'}"    @click="setEtaSource('current_eta')">SAP交期</button>
                <button :class="{active:etaSource==='supplier_eta'}"   @click="setEtaSource('supplier_eta')">邮件反馈交期</button>
              </div>
            </div>
            <button class="btn btn-primary btn-sm" @click="openExportDraft()" :disabled="selectedBuyers.size===0">📧 添加到邮件</button>
            <span class="selected-hint" x-show="selectedBuyers.size" x-text="'已选 ' + selectedBuyers.size + ' 个采购员'"></span>
          </div>

          <!-- ── Summary Cards ── -->
          <div class="stat-grid" style="margin-bottom:16px;">
            <template x-for="card in summaryCards" :key="card.id">
              <div class="stat-card" :class="cardClass(card)">
                <div class="num" x-text="card.value || 0"></div>
                <div class="label" x-text="card.label"></div>
              </div>
            </template>
          </div>

          <!-- ── 采购员风险概览（Clustered）── -->
          <div class="card" style="margin-bottom:16px;" x-show="buyerRows.length>0">
            <div class="card-header">
              <h3>采购员风险概览</h3>
              <button class="btn btn-outline btn-sm" @click="riskChartCollapsed=!riskChartCollapsed"
                x-text="riskChartCollapsed ? '▶ 展开' : '▼ 收起'"></button>
            </div>
            <div x-show="!riskChartCollapsed">
              <div class="card-body" style="padding:12px;">
                <canvas id="chart-buyer-risk" height="140"></canvas>
              </div>
            </div>
          </div>

          <!-- ── 采购员催办看板 ── -->
          <div class="card" style="margin-bottom:16px;">
            <div class="card-header">
              <h3>采购员催办看板</h3>
              <div style="display:flex;gap:8px;align-items:center;">
                <button class="btn btn-outline btn-sm" @click="loadLeadBuyer();$nextTick(()=>renderBuyerRiskChart())">刷新</button>
                <button class="btn btn-outline btn-sm" @click="buyerTableCollapsed=!buyerTableCollapsed"
                  x-text="buyerTableCollapsed ? '▶ 展开' : '▼ 收起'"></button>
              </div>
            </div>
            <div x-show="!buyerTableCollapsed">
              <div class="table-wrap">
                <table class="lead-dashboard-table">
                  <thead>
                    <tr>
                      <th><input type="checkbox" @change="toggleAllBuyers()" :checked="buyerRows.length && selectedBuyers.size===buyerRows.length" /></th>
                      <th>采购员</th>
                      <th style="cursor:pointer;white-space:nowrap;" @click="sortBy('open_count')">
                        Open <span x-text="sortIcon('open_count')" style="font-size:10px;opacity:.7;"></span></th>
                      <th style="cursor:pointer;white-space:nowrap;" @click="sortBy('no_oc_count')">
                        无OC <span x-text="sortIcon('no_oc_count')" style="font-size:10px;opacity:.7;"></span></th>
                      <th style="cursor:pointer;white-space:nowrap;" @click="sortBy('overdue_now_count')">
                        应交未交 <span x-text="sortIcon('overdue_now_count')" style="font-size:10px;opacity:.7;"></span></th>
                      <th style="cursor:pointer;white-space:nowrap;" @click="sortBy('overdue_keydate_count')">
                        晚于节点 <span x-text="sortIcon('overdue_keydate_count')" style="font-size:10px;opacity:.7;"></span></th>
                      <th style="cursor:pointer;white-space:nowrap;" @click="sortBy('chased_no_feedback_count')">
                        已催未回复 <span x-text="sortIcon('chased_no_feedback_count')" style="font-size:10px;opacity:.7;"></span></th>
                      <th>Top 风险制造商</th>
                      <th>操作</th>
                    </tr>
                  </thead>
                  <tbody>
                    <template x-for="row in sortedBuyerRows" :key="row.buyer_key">
                      <tr>
                        <td><input type="checkbox" :checked="selectedBuyers.has(row.buyer_key)" @change="toggleBuyer(row.buyer_key)" /></td>
                        <td>
                          <div style="font-weight:600;" x-text="row.buyer_display"></div>
                          <div style="font-size:11px;color:#6b7280;" x-text="row.buyer_email || ''"></div>
                        </td>
                        <td><button class="metric-link" @click="openMaterials(row)" x-text="row.open_count"></button></td>
                        <td><button class="metric-link warn" @click="openMaterials(row,'no_oc')" x-text="row.no_oc_count"></button></td>
                        <td><button class="metric-link danger" @click="openMaterials(row,'overdue_now')" x-text="row.overdue_now_count"></button></td>
                        <td><button class="metric-link danger" @click="openMaterials(row,'overdue_keydate')" x-text="row.overdue_keydate_count"></button></td>
                        <td><button class="metric-link warn" @click="openMaterials(row,'chased_no_feedback')" x-text="row.chased_no_feedback_count"></button></td>
                        <td class="evidence-cell" x-text="evidenceText(row.top_manufacturers)"></td>
                        <td><button class="btn btn-outline btn-sm" @click="openMaterials(row)">查看物料</button></td>
                      </tr>
                    </template>
                    <template x-if="buyerRows.length===0">
                      <tr><td colspan="9" class="empty">暂无 Dashboard 数据</td></tr>
                    </template>
                  </tbody>
                </table>
              </div>
            </div>
          </div>

          <!-- ── Pivot A：Buyer × Doc.Date × Value ── -->
          <div class="card" style="margin-bottom:16px;">
            <div class="card-header">
              <h3>采购员 × 下单日期 透视表</h3>
              <div style="display:flex;gap:6px;align-items:center;">
                <div class="segmented">
                  <button :class="{active:pivotAValueType==='no_oc'}"           @click="setPivotAValueType('no_oc')">无OC</button>
                  <button :class="{active:pivotAValueType==='overdue_now'}"      @click="setPivotAValueType('overdue_now')">应交未交</button>
                  <button :class="{active:pivotAValueType==='overdue_keydate'}"  @click="setPivotAValueType('overdue_keydate')">晚于节点</button>
                </div>
                <button class="btn btn-outline btn-sm" @click="loadPivotA()">🔄</button>
                <button class="btn btn-outline btn-sm" @click="pivotACollapsed=!pivotACollapsed"
                  x-text="pivotACollapsed ? '▶ 展开' : '▼ 收起'"></button>
              </div>
            </div>
            <div x-show="!pivotACollapsed">
              <div class="card-body" style="padding:12px;">
                <div x-show="pivotALoading" style="text-align:center;padding:20px;color:#888;">加载中…</div>
                <template x-if="!pivotALoading && pivotA">
                  <div>
                    <div style="margin-bottom:16px;max-height:200px;">
                      <canvas id="chart-pivot-a" height="160"></canvas>
                    </div>
                    <div class="table-wrap" style="max-height:420px;overflow:auto;">
                      <table style="font-size:12px;white-space:nowrap;">
                        <thead>
                          <tr>
                            <th style="position:sticky;left:0;background:#f3f4f6;z-index:1;min-width:100px;">采购员</th>
                            <template x-for="dt in pivotA.dates" :key="dt">
                              <th style="text-align:center;min-width:52px;" x-text="dt"></th>
                            </template>
                            <th style="text-align:center;background:#f3f4f6;font-weight:700;min-width:52px;">合计</th>
                          </tr>
                        </thead>
                        <tbody>
                          <template x-for="buyer in pivotA.buyers" :key="buyer">
                            <tr>
                              <td style="position:sticky;left:0;background:#fff;font-weight:600;z-index:1;" x-text="buyer"></td>
                              <template x-for="dt in pivotA.dates" :key="dt">
                                <td style="text-align:center;">
                                  <span x-show="pivotACell(buyer,dt)>0"
                                    style="display:inline-block;min-width:24px;padding:2px 4px;border-radius:3px;background:#ede9fe;color:#5b21b6;font-weight:600;"
                                    x-text="pivotACell(buyer,dt)"></span>
                                  <span x-show="pivotACell(buyer,dt)===0" style="color:#d1d5db;">—</span>
                                </td>
                              </template>
                              <td style="text-align:center;font-weight:700;background:#f9fafb;" x-text="pivotA.row_totals[buyer]||0"></td>
                            </tr>
                          </template>
                          <tr style="background:#f3f4f6;font-weight:700;">
                            <td style="position:sticky;left:0;background:#f3f4f6;">合计</td>
                            <template x-for="dt in pivotA.dates" :key="dt">
                              <td style="text-align:center;" x-text="pivotA.col_totals[dt]||0"></td>
                            </template>
                            <td style="text-align:center;" x-text="pivotA.buyers.reduce((s,b)=>s+(pivotA.row_totals[b]||0),0)"></td>
                          </tr>
                        </tbody>
                      </table>
                    </div>
                    <div x-show="!pivotA.buyers.length" class="empty" style="padding:20px;">该维度下暂无数据</div>
                  </div>
                </template>
              </div>
            </div>
          </div>

          <!-- ── Pivot B：Buyer → Manufacturer × 晚于节点 ── -->
          <div class="card" style="margin-bottom:16px;">
            <div class="card-header">
              <h3>采购员 → 制造商 晚于节点明细</h3>
              <div style="display:flex;gap:6px;align-items:center;">
                <button class="btn btn-outline btn-sm" @click="loadPivotB()">🔄</button>
                <button class="btn btn-outline btn-sm" @click="pivotBCollapsed=!pivotBCollapsed"
                  x-text="pivotBCollapsed ? '▶ 展开' : '▼ 收起'"></button>
              </div>
            </div>
            <div x-show="!pivotBCollapsed">
              <div class="card-body" style="padding:12px;">
                <div x-show="pivotBLoading" style="text-align:center;padding:20px;color:#888;">加载中…</div>
                <template x-if="!pivotBLoading && pivotB">
                  <div>
                    <div style="margin-bottom:16px;max-height:220px;">
                      <canvas id="chart-pivot-b" height="180"></canvas>
                    </div>
                    <div class="table-wrap">
                      <table style="font-size:13px;">
                        <thead>
                          <tr>
                            <th style="min-width:160px;">采购员 / 制造商</th>
                            <th style="text-align:center;width:80px;">晚于节点</th>
                          </tr>
                        </thead>
                        <tbody>
                          <template x-for="row in pivotB.rows" :key="row.buyer">
                            <tr style="background:#f9fafb;cursor:pointer;" @click="togglePivotBBuyer(row.buyer)">
                              <td style="font-weight:700;padding-left:8px;">
                                <span x-text="pivotBExpanded[row.buyer] ? '▼ ' : '▶ '"></span>
                                <span x-text="row.buyer"></span>
                                <span style="font-size:11px;color:#6b7280;margin-left:4px;"
                                  x-text="row.buyer_email ? '('+row.buyer_email+')' : ''"></span>
                              </td>
                              <td style="text-align:center;font-weight:700;color:#7c3aed;" x-text="row.total"></td>
                            </tr>
                            <template x-if="pivotBExpanded[row.buyer]">
                              <template x-for="mfr in row.manufacturers" :key="mfr.name">
                                <tr>
                                  <td style="padding-left:32px;color:#374151;">
                                    <span style="color:#9ca3af;margin-right:4px;">└</span>
                                    <span x-text="mfr.name"></span>
                                  </td>
                                  <td style="text-align:center;" x-text="mfr.count"></td>
                                </tr>
                              </template>
                            </template>
                          </template>
                          <template x-if="!pivotB.rows.length">
                            <tr><td colspan="2" class="empty">暂无晚于节点物料</td></tr>
                          </template>
                        </tbody>
                      </table>
                    </div>
                  </div>
                </template>
              </div>
            </div>
          </div>

          <!-- ── 添加到邮件 弹窗 ── -->
          <div class="modal-overlay" x-show="showExportDraft" @click.self="showExportDraft=false" style="display:none;">
            <div class="modal" style="width:680px;" x-show="showExportDraft">
              <div class="modal-header">
                <h3>添加到邮件</h3>
                <button class="modal-close" @click="showExportDraft=false">×</button>
              </div>
              <div class="modal-body">
                <div style="display:grid;gap:14px;">

                  <!-- 导出模式 -->
                  <div class="form-row">
                    <label class="field-label" style="width:72px;">发送方式</label>
                    <div style="display:flex;gap:20px;">
                      <label class="check-label"><input type="radio" x-model="exportMode" value="combined" /> 汇总一封</label>
                      <label class="check-label"><input type="radio" x-model="exportMode" value="per_buyer" /> 每人一封（To 默认填采购员邮箱）</label>
                    </div>
                  </div>

                  <!-- To（仅汇总模式显示） -->
                  <div class="form-row" x-show="exportMode==='combined'">
                    <label class="field-label" style="width:72px;">To</label>
                    <input type="text" x-model="exportForm.to" placeholder="收件人邮箱，可为空" style="flex:1;" />
                  </div>

                  <!-- CC -->
                  <div class="form-row">
                    <label class="field-label" style="width:72px;">CC</label>
                    <input type="text" x-model="exportForm.cc" placeholder="抄送，可为空" style="flex:1;" />
                  </div>

                  <!-- Subject（汇总模式） -->
                  <div class="form-row" x-show="exportMode==='combined'">
                    <label class="field-label" style="width:72px;">Subject</label>
                    <input type="text" x-model="exportForm.subject" :placeholder="`[${pname}]物料概览`" style="flex:1;" />
                  </div>

                  <!-- 选择邮件正文内容 -->
                  <div>
                    <div class="field-label" style="margin-bottom:8px;">邮件正文内容（选择要加入的要素）</div>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px 24px;">
                      <label class="check-label"><input type="checkbox" x-model="exportElements.summary" /> 状态概览数字</label>
                      <label class="check-label"><input type="checkbox" x-model="exportElements.buyerTable" /> 采购员催办看板（表格）</label>
                      <label class="check-label"><input type="checkbox" x-model="exportElements.buyerChart" /> 采购员风险概览（图表）</label>
                      <label class="check-label"><input type="checkbox" x-model="exportElements.pivotATable" /> 采购员×下单日期透视表</label>
                      <label class="check-label"><input type="checkbox" x-model="exportElements.pivotAChart" /> 透视表柱状图</label>
                      <label class="check-label"><input type="checkbox" x-model="exportElements.pivotBTable" /> 制造商晚于节点明细（表格）</label>
                      <label class="check-label"><input type="checkbox" x-model="exportElements.pivotBChart" /> 制造商晚于节点（图表）</label>
                    </div>
                  </div>

                  <!-- 说明 -->
                  <div style="font-size:12px;color:#6b7280;background:#f9fafb;padding:8px 10px;border-radius:5px;">
                    ETA基准：<strong x-text="etaLabel()"></strong>
                    &nbsp;·&nbsp;不会发送邮件，不增加催货次数
                    <span x-show="exportElements.buyerChart||exportElements.pivotAChart||exportElements.pivotBChart">
                      &nbsp;·&nbsp;图表将以图片形式嵌入正文
                    </span>
                  </div>
                </div>
              </div>
              <div class="modal-footer">
                <button class="btn btn-outline" @click="showExportDraft=false">取消</button>
                <button class="btn btn-primary" @click="exportDashboardDraft()" :disabled="exportLoading">
                  <span x-text="exportLoading ? '正在生成草稿…' : (exportMode==='per_buyer' ? '逐人生成草稿' : '添加到邮件')"></span>
                </button>
              </div>
            </div>
          </div>

        </div>
      </div>
    </template>


    <!-- ════════ Chat ════════ -->
    <template x-if="$store.nav.page === 'chat' && activeProject">
      <div x-data="chat(activeProject.id)" style="display:flex;flex-direction:column;flex:1;min-height:0;">
        <div class="topbar">
          <span class="topbar-title">Chat</span>
          <span style="font-size:12px;color:#888;">用自然语言查询物料、更新数据</span>
        </div>
        <div class="chat-messages" id="chat-scroll">
          <template x-if="messages.length===0">
            <div style="text-align:center;color:#888;padding:60px 20px;">
              <div style="font-size:36px;margin-bottom:10px;">💬</div>
              <div>你好！可以问我：哪些订单已逾期？哪些还没有确认交期？</div>
            </div>
          </template>
          <template x-for="(msg, i) in messages" :key="i">
            <div class="chat-msg" :class="msg.role">
              <template x-if="msg.role==='user'">
                <div class="chat-bubble" x-text="msg.content"></div>
              </template>
              <template x-if="msg.role==='assistant'">
                <div class="chat-bubble chat-bubble-md" x-html="marked.parse(msg.content||'', {breaks:true})"></div>
              </template>
            </div>
          </template>
          <div x-show="loading" class="chat-msg assistant">
            <div class="chat-bubble" style="color:#888;">正在思考…</div>
          </div>
        </div>
        <div class="chat-input-bar">
          <textarea x-model="input" @keydown="onKeydown($event)" placeholder="输入问题…（Enter 发送，Shift+Enter 换行）"></textarea>
          <button class="btn btn-primary" @click="send()" :disabled="loading||!input.trim()">发送</button>
        </div>
      </div>
    </template>


    <!-- ════════ 导入导出 Excel ════════ -->
    <template x-if="$store.nav.page === 'imports' && activeProject">
      <div x-data="imports(activeProject.id)" style="display:flex;flex-direction:column;flex:1;min-height:0;">
        <div class="topbar"><span class="topbar-title">导入导出 Excel</span></div>
        <div class="content">
          <div class="card" style="margin-bottom:16px;">
            <div class="card-header"><h3>上传文件</h3></div>
            <div class="card-body">
              <div class="upload-zone"
                :class="{'drag-over': dragging}"
                @dragover.prevent="dragging=true"
                @dragleave="dragging=false"
                @drop.prevent="onDrop($event)"
                @click="$refs.fileInput.click()"
              >
                <div style="font-size:40px;margin-bottom:8px;">📂</div>
                <div>拖入 Excel 文件，或点击选择</div>
                <div style="font-size:12px;color:#888;margin-top:4px;">支持 .xlsx / .xls（大小写均可）</div>
              </div>
              <input type="file" x-ref="fileInput" accept=".xlsx,.xls,.XLSX,.XLS" style="display:none;" @change="onFileInput($event)" />

              <!-- 导出操作区 -->
              <div style="display:flex;gap:10px;margin-top:16px;flex-wrap:wrap;align-items:center;">
                <button class="btn btn-outline btn-sm" @click="exportDb()" title="将数据库中全部物料导出为 Excel，重点物料行高亮">
                  📤 导出完整数据
                </button>
                <button class="btn btn-outline btn-sm" @click="exportChase()" :disabled="exportChaseLoading || !lastImportPath"
                  :title="lastImportPath ? '在最近导入的文件末尾追加催货信息，另存为 -chase.xlsx' : '请先导入一个 Excel 文件'">
                  <span x-show="!exportChaseLoading">🔗 追加催货列并导出</span>
                  <span x-show="exportChaseLoading">处理中…</span>
                </button>
                <span x-show="lastImportPath" style="font-size:11px;color:#888;" x-text="'源文件：' + (lastImportPath || '').split(/[/\\\\]/).pop()"></span>
              </div>

              <div x-show="loading" style="margin-top:12px;text-align:center;color:#888;">导入中…</div>

              <template x-if="result">
                <div style="margin-top:16px;">
                  <div class="stat-grid">
                    <div class="stat-card success"><div class="num" x-text="result.rows_added"></div><div class="label">新增行</div></div>
                    <div class="stat-card primary"><div class="num" x-text="result.rows_updated"></div><div class="label">更新行</div></div>
                    <div class="stat-card warning"><div class="num" x-text="result.rows_skipped"></div><div class="label">跳过行</div></div>
                  </div>
                  <template x-if="result.errors && result.errors.length">
                    <div style="margin-top:12px;">
                      <div style="font-weight:600;font-size:13px;color:#dc2626;margin-bottom:6px;">异常行（缺 PO/行号 或 数量=0）</div>
                      <div style="border:1px solid #fecaca;border-radius:6px;overflow:auto;max-height:160px;">
                        <table style="font-size:12px;width:100%;">
                          <thead><tr style="background:#fef2f2;"><th style="padding:5px 10px;">Excel行</th><th>原因</th></tr></thead>
                          <tbody>
                            <template x-for="err in result.errors" :key="err.row">
                              <tr><td style="padding:3px 10px;" x-text="err.row"></td><td x-text="err.reason"></td></tr>
                            </template>
                          </tbody>
                        </table>
                      </div>
                    </div>
                  </template>
                </div>
              </template>
            </div>
          </div>

          <div class="card">
            <div class="card-header"><h3>导入历史</h3></div>
            <div class="table-wrap">
              <table>
                <thead><tr><th>文件</th><th>时间</th><th>新增</th><th>更新</th><th>跳过</th></tr></thead>
                <tbody>
                  <template x-for="h in history" :key="h.id">
                    <tr>
                      <td x-text="(h.file_path||'').split(/[/\\]/).pop()||'—'"></td>
                      <td x-text="(h.imported_at||'').slice(0,16)"></td>
                      <td x-text="h.rows_added"></td><td x-text="h.rows_updated"></td><td x-text="h.rows_skipped"></td>
                    </tr>
                  </template>
                  <template x-if="history.length===0"><tr><td colspan="5" class="empty">暂无记录</td></tr></template>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </template>


    <!-- ════════ 设置 ════════ -->
    <template x-if="$store.nav.page === 'settings'">
      <div x-data="settings" style="display:flex;flex-direction:column;flex:1;min-height:0;overflow-y:auto;">
        <div class="topbar"><span class="topbar-title">系统设置</span></div>
        <div class="content">

          <!-- API / 环境变量配置 -->
          <div class="card" style="max-width:700px;margin-bottom:16px;">
            <div class="card-header"><h3>环境变量（.env）</h3></div>
            <div class="card-body">
              <div style="font-size:12px;color:#888;margin-bottom:12px;">
                支持任意键值对，常用：ANTHROPIC_API_KEY、LLM_MODEL、LLM_PROVIDER、CHASE_DEFAULT_MODE 等。
                敏感字段显示为 *** 但仍可覆盖写入。
              </div>
              <table style="width:100%;font-size:13px;margin-bottom:12px;">
                <thead><tr style="background:#f9fafb;"><th style="padding:6px 8px;text-align:left;">键</th><th style="text-align:left;">值</th></tr></thead>
                <tbody>
                  <template x-for="[k, v] in envEntries" :key="k">
                    <tr style="border-bottom:1px solid #f3f4f6;">
                      <td style="padding:4px 8px;font-weight:600;width:220px;" x-text="k"></td>
                      <td><input type="text" x-model="envVars[k]" style="width:100%;border:none;padding:3px 6px;background:transparent;font-size:12px;" /></td>
                    </tr>
                  </template>
                </tbody>
              </table>
              <div style="display:flex;gap:8px;align-items:center;margin-bottom:10px;">
                <input type="text" x-model="newKey" placeholder="新键名（如 MY_API_KEY）" style="width:200px;" />
                <input type="text" x-model="newVal" placeholder="值" style="flex:1;" />
              </div>
              <button class="btn btn-primary btn-sm" @click="saveEnv()" :disabled="loading">
                <span x-text="loading ? '保存中…' : '💾 保存 .env'"></span>
              </button>
            </div>
          </div>

          <!-- 采购组 PGR 配置 -->
          <div class="card" style="max-width:700px;">
            <div class="card-header"><h3>采购组人员配置（PGR）</h3></div>
            <div class="card-body">
              <div style="font-size:12px;color:#888;margin-bottom:12px;">
                人员变动时直接在此修改，立即生效（下次导入 Excel 时读取）。
              </div>
              <table style="width:100%;font-size:13px;margin-bottom:12px;">
                <thead><tr style="background:#f9fafb;">
                  <th style="padding:6px 8px;text-align:left;width:80px;">代码</th>
                  <th style="text-align:left;width:140px;">姓名</th>
                  <th style="text-align:left;">邮箱</th>
                  <th style="width:60px;"></th>
                </tr></thead>
                <tbody>
                  <template x-for="[k, v] in pgrEntries" :key="k">
                    <tr style="border-bottom:1px solid #f3f4f6;">
                      <td style="padding:4px 8px;font-weight:600;" x-text="k"></td>
                      <td><input type="text" x-model="pgr[k].name" style="width:100%;border:none;padding:3px;font-size:12px;background:transparent;" /></td>
                      <td><input type="text" x-model="pgr[k].email" style="width:100%;border:none;padding:3px;font-size:12px;background:transparent;" /></td>
                      <td style="white-space:nowrap;">
                        <button class="btn btn-outline btn-sm" @click="savePgr(k, pgr[k])">保存</button>
                        <button class="btn btn-danger btn-sm" @click="deletePgr(k)">删除</button>
                      </td>
                    </tr>
                  </template>
                  <template x-if="pgrEntries.length===0">
                    <tr><td colspan="4" class="empty" style="padding:20px;">暂无配置，在下方添加</td></tr>
                  </template>
                </tbody>
              </table>
              <div style="display:flex;gap:8px;align-items:center;">
                <input type="text" x-model="newPg.key" placeholder="代码（如 ABC）" style="width:80px;" maxlength="3" />
                <input type="text" x-model="newPg.name" placeholder="姓名" style="width:120px;" />
                <input type="text" x-model="newPg.email" placeholder="邮箱" style="flex:1;" />
                <button class="btn btn-primary btn-sm" @click="addPgr()">添加</button>
              </div>
            </div>
          </div>

        </div>
      </div>
    </template>

  </div><!-- /main -->
</div><!-- /app -->

</body>
